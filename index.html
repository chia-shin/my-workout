<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>運動數位筆記 v2.1.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 強制拔除 iOS 原生輸入框的頑固樣式與不對稱襯墊 */
        input[type="date"], input[type="time"], select, input[type="text"] {
            -webkit-appearance: none;
            appearance: none;
            line-height: normal !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 p-4 font-sans max-w-md mx-auto pb-24">

    <header class="mb-4 pt-4 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-emerald-400">🏋️ 運動數位筆記</h1>
            <p class="text-xs text-gray-400">資料全數安全儲存於手機地端</p>
        </div>
        <button onclick="exportData()" class="text-xs bg-gray-800 hover:bg-gray-700 border border-gray-700 px-3 py-2 rounded-lg text-gray-300 active:scale-95 transition">
            📦 備份
        </button>
    </header>

    <div class="flex bg-gray-800 p-1 rounded-xl mb-5 border border-gray-700 text-sm font-medium">
        <button id="tab-form" onclick="switchTab('form')" class="w-1/2 py-2.5 text-center rounded-lg transition duration-150 bg-emerald-500 text-gray-900 font-bold">
            ✍️ 新增紀錄
        </button>
        <button id="tab-history" onclick="switchTab('history')" class="w-1/2 py-2.5 text-center rounded-lg transition duration-150 text-gray-400 hover:text-gray-200">
            🔍 歷史查詢
        </button>
    </div>

    <div id="page-form" class="space-y-4">
        <div class="bg-gray-800 p-5 rounded-2xl shadow-xl border border-gray-700">
            <form id="workoutForm" class="space-y-4">
                
                <div class="flex gap-3 w-full">
                    <div class="flex-1 flex flex-col">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">📅 日期</label>
                        <div class="flex items-center justify-center bg-gray-700 rounded-xl border border-gray-600 focus-within:border-emerald-500 h-14 overflow-hidden">
                            <input type="date" id="date" class="w-full h-full bg-transparent text-white px-3 text-center focus:outline-none" required>
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">⏰ 開始時間</label>
                        <div class="flex items-center justify-center bg-gray-700 rounded-xl border border-gray-600 focus-within:border-emerald-500 h-14 overflow-hidden">
                            <input type="time" id="startTime" class="w-full h-full bg-transparent text-white px-3 text-center focus:outline-none" required>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3 w-full">
                    <div class="flex-1 flex flex-col">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">⏳ 持續時間</label>
                        <div class="flex items-center justify-center bg-gray-700 rounded-xl border border-gray-600 h-14 overflow-hidden">
                            <select id="duration" class="w-full h-full bg-transparent text-white px-3 text-center focus:outline-none" required>
                                <option value="15">15 分鐘</option>
                                <option value="30">30 分鐘</option>
                                <option value="45">45 分鐘</option>
                                <option value="60" selected>60 分鐘</option>
                                <option value="75">75 分鐘</option>
                                <option value="90">90 分鐘</option>
                                <option value="105">105 分鐘</option>
                                <option value="120">120 分鐘</option>
                                <option value="150">150 分鐘</option>
                                <option value="180">180 分鐘</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">🏃 運動類型</label>
                        <div class="flex items-center justify-center bg-gray-700 rounded-xl border border-gray-600 h-14 overflow-hidden">
                            <select id="sportType" class="w-full h-full bg-transparent text-white px-3 text-center focus:outline-none" required>
                                <option value="重量訓練">重量訓練</option>
                                <option value="有氧運動">有氧運動</option>
                                <option value="高強度間歇 (HIIT)">高強度間歇 (HIIT)</option>
                                <option value="瑜珈 / 伸展">瑜珈 / 伸展</option>
                                <option value="皮拉提斯">皮拉提斯</option>
                                <option value="拳擊 / 格鬥">拳擊 / 格鬥</option>
                                <option value="其它">其它</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">👤 指導教練</label>
                    <div class="flex items-center bg-gray-700 rounded-xl border border-gray-600 h-14 overflow-hidden">
                        <input type="text" id="coach" placeholder="自主訓練（或輸入教練名字）" class="w-full h-full bg-transparent text-white px-4 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">📝 運動備註</label>
                    <textarea id="notes" rows="3" placeholder="紀錄今天的心得、課表細節或身體狀態..." class="w-full bg-gray-700 rounded-xl p-4 text-white border border-gray-600 focus:outline-none focus:border-emerald-500 resize-none"></textarea>
                </div>

                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-900 font-bold p-3.5 rounded-xl transition duration-200 mt-2 active:scale-95 shadow-lg shadow-emerald-500/20 text-base">
                    儲存今日紀錄
                </button>
            </form>
        </div>
    </div>

    <div id="page-history" class="hidden space-y-4">
        <div class="bg-gray-800 p-3 rounded-xl border border-gray-700 flex items-center justify-between sticky top-2 z-10 shadow-lg">
            <span class="text-xs font-semibold text-gray-400 ml-1">🎯 篩選運動項目:</span>
            <select id="filterSportType" onchange="renderLogs()" class="bg-gray-700 rounded-lg p-2 text-sm text-white border border-gray-600 focus:outline-none focus:border-emerald-500 max-w-[60%]">
                <option value="全部">🔍 顯示全部紀錄</option>
                <option value="重量訓練">重量訓練</option>
                <option value="有氧運動">有氧運動</option>
                <option value="高強度間歇 (HIIT)">高強度間歇 (HIIT)</option>
                <option value="瑜珈 / 伸展">瑜珈 / 伸展</option>
                <option value="皮拉提斯">皮拉提斯</option>
                <option value="拳擊 / 格鬥">拳擊 / 格鬥</option>
                <option value="其它">其它</option>
            </select>
        </div>

        <div id="logsContainer" class="space-y-3">
            </div>
    </div>

    <script>
        // 初始化：自動帶入今天日期與現在時間
        const now = new Date();
        document.getElementById('date').value = now.toISOString().split('T')[0];
        
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('startTime').value = `${hours}:${minutes}`;

        const form = document.getElementById('workoutForm');
        const logsContainer = document.getElementById('logsContainer');

        // 分頁切換邏輯
        function switchTab(tab) {
            const btnForm = document.getElementById('tab-form');
            const btnHistory = document.getElementById('tab-history');
            const pageForm = document.getElementById('page-form');
            const pageHistory = document.getElementById('page-history');

            if (tab === 'form') {
                btnForm.className = "w-1/2 py-2.5 text-center rounded-lg transition duration-150 bg-emerald-500 text-gray-900 font-bold";
                btnHistory.className = "w-1/2 py-2.5 text-center rounded-lg transition duration-150 text-gray-400 hover:text-gray-200";
                pageForm.classList.remove('hidden');
                pageHistory.classList.add('hidden');
            } else {
                btnHistory.className = "w-1/2 py-2.5 text-center rounded-lg transition duration-150 bg-emerald-500 text-gray-900 font-bold";
                btnForm.className = "w-1/2 py-2.5 text-center rounded-lg transition duration-150 text-gray-400 hover:text-gray-200";
                pageForm.classList.add('hidden');
                pageHistory.classList.remove('hidden');
                renderLogs();
            }
        }

        // 讀取 LocalStorage 資料
        function getLogs() {
            const logs = localStorage.getItem('workout_logs_v2');
            return logs ? JSON.parse(logs) : [];
        }

        // 渲染歷史紀錄
        function renderLogs() {
            let logs = getLogs();
            const filterValue = document.getElementById('filterSportType').value;

            if (filterValue !== '全部') {
                logs = logs.filter(log => log.sportType === filterValue);
            }

            logs.sort((a, b) => {
                const dateTimeA = new Date(`${a.date}T${a.startTime}`);
                const dateTimeB = new Date(`${b.date}T${b.startTime}`);
                return dateTimeB - dateTimeA;
            });
            
            if (logs.length === 0) {
                logsContainer.innerHTML = `
                    <div class="text-gray-500 text-center py-12 text-sm bg-gray-800/40 rounded-xl border border-dashed border-gray-700">
                        沒有找到「${filterValue === '全部' ? '' : filterValue}」的相關運動紀錄 🧘
                    </div>`;
                return;
            }

            // 回復舒適的 p-2.5 留白，把高度留給純淨的文字
            logsContainer.innerHTML = logs.map((log) => `
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700/60 shadow-md flex flex-col">
                    <div class="flex justify-between items-center mb-1.5">
                        <div class="flex items-center gap-2">
                            <span class="inline-block bg-emerald-500/10 text-emerald-400 text-xs px-2.5 py-1 rounded-md font-medium">
                                ${log.sportType}
                            </span>
                            ${log.coach ? `
                            <span class="inline-block bg-gray-700 text-gray-300 text-[11px] px-2 py-0.5 rounded-md border border-gray-600">
                                👤 ${log.coach}
                            </span>` : ''}
                        </div>
                        <button onclick="deleteLog('${log.id}')" class="text-gray-500 hover:text-red-400 p-1 text-sm active:scale-90 transition">
                            🗑️
                        </button>
                    </div>
                    
                    <div class="text-xs text-gray-400 font-mono">
                        📅 ${log.date} ｜ ⏰ ${log.startTime} (${log.duration}分鐘)
                    </div>

                    ${log.notes ? `
                    <div class="text-sm bg-gray-900/40 p-2.5 rounded-lg text-gray-300 border border-gray-700/40 whitespace-pre-line mt-2.5">
                        ${log.notes}
                    </div>` : ''}
                </div>
            `).join('');
        }

        // 監聽表單送出
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // 使用強力正規表達式，強制清洗掉首尾所有的隱形換行、特殊空白符號
            const cleanCoach = document.getElementById('coach').value.replace(/^\s+|\s+$/g, '');
            const cleanNotes = document.getElementById('notes').value.replace(/^\s+|\s+$/g, '');
            
            const newLog = {
                id: Date.now().toString(),
                date: document.getElementById('date').value,
                startTime: document.getElementById('startTime').value,
                duration: document.getElementById('duration').value,
                sportType: document.getElementById('sportType').value,
                coach: cleanCoach,
                notes: cleanNotes
            };

            const logs = getLogs();
            logs.push(newLog);
            localStorage.setItem('workout_logs_v2', JSON.stringify(logs));

            document.getElementById('coach').value = '';
            document.getElementById('notes').value = '';
            
            switchTab('history');
        });

        // 刪除紀錄
        function deleteLog(id) {
            if (confirm('確定要刪除這筆紀錄嗎？')) {
                let logs = getLogs();
                logs = logs.filter(log => log.id !== id);
                localStorage.setItem('workout_logs_v2', JSON.stringify(logs));
                renderLogs();
            }
        }

        // 匯出 JSON 備份
        function exportData() {
            const logs = localStorage.getItem('workout_logs_v2');
            if (!logs || logs === '[]') return alert('目前沒有資料可匯出');
            
            const blob = new Blob([logs], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `workout_records_${document.getElementById('date').value}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // 初始載入
        renderLogs();
    </script>
</body>
</html>
